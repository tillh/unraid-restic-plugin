name: Cleanup Old Releases

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-old-releases.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old releases and tags
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tags = ['v2026.03.31.1', 'v2026.03.31.2', 'v2026.03.31.3'];

            for (const tag of tags) {
              try {
                const release = await github.rest.repos.getReleaseByTag({owner, repo, tag});
                await github.rest.repos.deleteRelease({owner, repo, release_id: release.data.id});
                core.info(`Deleted release for ${tag}`);
              } catch (error) {
                if (error.status === 404) {
                  core.info(`No release found for ${tag}`);
                } else {
                  throw error;
                }
              }

              try {
                await github.rest.git.deleteRef({owner, repo, ref: `tags/${tag}`});
                core.info(`Deleted tag ${tag}`);
              } catch (error) {
                if (error.status === 404) {
                  core.info(`No tag found for ${tag}`);
                } else {
                  throw error;
                }
              }
            }
