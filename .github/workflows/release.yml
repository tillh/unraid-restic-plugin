name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'VERSION'
      - 'dist/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "value=$(tr -d '\n' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Verify tag exists
        run: git rev-parse "refs/tags/v${{ steps.version.outputs.value }}"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: v${{ steps.version.outputs.value }}
          generate_release_notes: true
          files: |
            dist/restic.plg
            dist/packages/restic-${{ steps.version.outputs.value }}-noarch-1.txz
          fail_on_unmatched_files: true
